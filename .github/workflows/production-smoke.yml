name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  live:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Check production
        run: npx playwright test e2e/live.spec.ts
        env:
          E2E_BASE_URL: https://aislego-frontend.onrender.com
          E2E_BACKEND_HEALTH_URL: https://aislego-backend.onrender.com/actuator/health
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: production-smoke-diagnostics
          path: |
            frontend/test-results
            frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 7
