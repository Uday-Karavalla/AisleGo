spring:
  application:
    name: aislego-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:aislego}
    username: ${DB_USER:aislego}
    password: ${DB_PASSWORD:aislego}
    hikari:
      # Small pool - both this app's own memory budget and free-tier managed Postgres
      # connection limits are tight; a low-traffic deployment doesn't need HikariCP's
      # default of 10.
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  # Only consumed when aislego.email.provider=smtp (see SmtpEmailService) - harmless to
  # configure unconditionally otherwise, since LoggingEmailService never touches JavaMailSender.
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          # Explicit timeouts so a blocked/unreachable SMTP port (common on PaaS free tiers,
          # which often filter outbound mail ports to prevent spam abuse) fails fast instead of
          # hanging the request thread - and the Hikari connection it holds, since this runs
          # inside AuthService's @Transactional registration - indefinitely.
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Adding spring-boot-starter-mail auto-registers a mail health contributor that actually
# opens an SMTP connection - with the zero-setup `mock` email provider (no SMTP credentials
# configured), that check fails and drags the whole /actuator/health status to DOWN, which
# would fail Render's health check and mark the whole deployment unhealthy even though the
# app itself is fine. Disabled since this app's health has never depended on email delivery.
management:
  health:
    mail:
      enabled: false

server:
  # Render (and most PaaS hosts) inject PORT and require the app to bind to it;
  # SERVER_PORT/8080 remain the fallback for docker-compose and local runs.
  port: ${PORT:${SERVER_PORT:8080}}
  tomcat:
    threads:
      # Tomcat's default (200) reserves far more thread-stack memory than a low-traffic
      # deployment on a memory-constrained host (e.g. Render's free tier) can spare.
      max: ${TOMCAT_MAX_THREADS:20}
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:4}

# Redis is provisioned in docker-compose for later phases (caching, rate limiting,
# session/OTP storage) but nothing in the first working flow needs it yet, so there is no
# spring-boot-starter-data-redis dependency or config here - adding one with no consumer
# would just be dead configuration.

aislego:
  security:
    jwt:
      secret: ${JWT_SECRET:dev-only-insecure-secret-change-me-please-32-bytes-min}
      access-token-ttl-ms: ${JWT_ACCESS_TTL_MS:900000}
      refresh-token-ttl-ms: ${JWT_REFRESH_TTL_MS:604800000}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
  payments:
    provider: ${PAYMENTS_PROVIDER:mock}
    razorpay:
      key-id: ${RAZORPAY_KEY_ID:}
      key-secret: ${RAZORPAY_KEY_SECRET:}
      webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
  routing:
    provider: ${ROUTING_PROVIDER:haversine}
    openrouteservice:
      api-key: ${OPENROUTESERVICE_API_KEY:}
  notifications:
    provider: ${NOTIFICATIONS_PROVIDER:mock}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_FROM_NUMBER:}
  email:
    provider: ${EMAIL_PROVIDER:mock}
    from-address: ${EMAIL_FROM_ADDRESS:}
    from-name: ${EMAIL_FROM_NAME:AisleGo}
    resend:
      api-key: ${RESEND_API_KEY:}

logging:
  level:
    root: INFO
    com.aislego: INFO

---
# 'local' profile: values tuned for the docker-compose stack in backend/docker-compose.yml.
# All connection details are still externalized via the same env vars - this profile just
# picks docker-compose-friendly defaults and turns on SQL logging for development.
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:aislego}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.aislego: DEBUG
    org.hibernate.SQL: DEBUG
