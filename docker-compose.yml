services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aislego
      POSTGRES_USER: aislego
      POSTGRES_PASSWORD: aislego
    ports:
      - "5432:5432"
    volumes:
      - aislego-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aislego -d aislego"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Not consumed by the app yet (see backend/src/main/resources/application.yml) -
  # provisioned now so caching / rate-limiting / OTP storage in later roadmap phases
  # don't need infra changes.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aislego
      DB_USER: aislego
      DB_PASSWORD: aislego
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-only-insecure-secret-change-me-please-32-bytes-min
      CORS_ALLOWED_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  aislego-postgres-data:
